# Auto-loads any dashboard JSON dropped into /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: Bonsai
    orgId: 1
    folder: Bonsai
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
