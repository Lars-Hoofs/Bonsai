allowBuilds:
  '@scarf/scarf': set this to true or false
  cpu-features: set this to true or false
  msgpackr-extract: set this to true or false
  protobufjs: set this to true or false
  ssh2: set this to true or false
  tesseract.js: set this to true or false
  unrs-resolver: set this to true or false
# These transitive deps ship optional native build scripts. We do NOT build
# them: each has a working JS fallback, none are needed at runtime, and building
# some (cpu-features, ssh2) requires a toolchain absent from node:*-alpine.
# Declaring them here silences pnpm v10+'s ERR_PNPM_IGNORED_BUILDS so a fresh,
# non-interactive `pnpm install --frozen-lockfile` (the Docker build) succeeds.
# (`allowBuilds` — used previously — is not a real pnpm field and did nothing.)
ignoredBuiltDependencies:
  - '@scarf/scarf'
  - cpu-features
  - msgpackr-extract
  - protobufjs
  - ssh2
  - unrs-resolver
